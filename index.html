<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oracle</title>
<meta name="description" content="Oracle Decompiler">
<link rel="icon" href="https://decompiler.mshq.dev/icon.ico" type="image/x-icon">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #000; overflow: hidden; }

  #app-frame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #000;
  }

  /* Loading splash (mirrors the Oracle login look) */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background: #000;
    transition: opacity .35s ease;
    font-family: Arial, Helvetica, sans-serif;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }
  #splash img { width: 96px; height: 96px; }
  #splash h1 { color: #e1e1e1; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  #splash p  { color: #888; font-size: 14px; }
  .spinner {
    width: 34px; height: 34px;
    border: 3px solid #2a2a2a;
    border-top-color: #0096ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Helper button, always available */
  #open-tab {
    position: fixed;
    right: 12px;
    bottom: 12px;
    z-index: 60;
    padding: 8px 14px;
    background: #1a1a1a;
    color: #0096ff;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    font: 500 12px Arial, Helvetica, sans-serif;
    text-decoration: none;
    opacity: 0;
    transition: opacity .3s ease;
    pointer-events: none;
  }
  #open-tab.show { opacity: .9; pointer-events: auto; }
  #open-tab:hover { background: #0096ff; color: #fff; }
</style>
</head>
<body>

<!-- The REAL working app, loaded live exactly like visiting the URL -->
<iframe
  id="app-frame"
  src="https://decompiler.mshq.dev/"
  allow="clipboard-read; clipboard-write; fullscreen"
  allowfullscreen
></iframe>

<div id="splash">
  <img src="https://decompiler.mshq.dev/icon.ico" alt="Oracle icon" onerror="this.style.display='none'">
  <h1>Welcome to Oracle</h1>
  <div class="spinner"></div>
  <p id="splash-msg">Loading live app…</p>
</div>

<a id="open-tab" href="https://decompiler.mshq.dev/" target="_blank" rel="noopener noreferrer">
  Open live site in new tab ↗
</a>

<script>
(function () {
  var frame  = document.getElementById('app-frame');
  var splash = document.getElementById('splash');
  var msg    = document.getElementById('splash-msg');
  var openTab = document.getElementById('open-tab');
  var done = false;

  function ready() {
    if (done) return;
    done = true;
    splash.classList.add('hidden');
  }

  // App loaded -> hide splash
  frame.addEventListener('load', function () {
    setTimeout(ready, 400);
  });

  // Show the helper button after a few seconds no matter what,
  // in case the network is slow or the frame gets blocked.
  setTimeout(function () {
    openTab.classList.add('show');
    if (!done) msg.textContent = 'Still loading… if it stays stuck, use the button below ↘';
  }, 6000);

  // Safety net: never leave the user staring at a splash forever
  setTimeout(ready, 15000);
})();
</script>

</body>
</html>
