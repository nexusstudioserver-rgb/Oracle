<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A1 — Opening Claude…</title>
<meta name="robots" content="noindex, nofollow">

<!-- Pre-warm Claude's servers BEFORE the hop so it loads faster -->
<link rel="preconnect" href="https://claude.ai" crossorigin>
<link rel="dns-prefetch" href="https://claude.ai">
<link rel="preconnect" href="https://assets-proxy.anthropic.com" crossorigin>
<link rel="dns-prefetch" href="https://assets-proxy.anthropic.com">

<!-- Instant hop (meta refresh = backup if JS is blocked) -->
<script>window.location.replace("https://claude.ai/new");</script>
<meta http-equiv="refresh" content="1;url=https://claude.ai/new">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #0a0b10;
    background-image:
      radial-gradient(600px 400px at 20% 10%, rgba(124,92,255,.12), transparent 60%),
      radial-gradient(500px 400px at 85% 85%, rgba(46,196,182,.08), transparent 60%);
    color: #eef0f6; overflow: hidden;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    width: 100%; max-width: 380px; background: rgba(20,22,32,.85);
    border: 1px solid rgba(255,255,255,.07); border-radius: 20px;
    padding: 34px 28px 26px; text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
    backdrop-filter: blur(10px);
  }
  .mark {
    width: 58px; height: 58px; margin: 0 auto 16px; border-radius: 16px;
    background: linear-gradient(135deg, #7c5cff, #4c3aff);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 22px; letter-spacing: .5px; color: #fff;
    box-shadow: 0 8px 24px rgba(124,92,255,.35);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.07); } }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: .2px; }
  p.sub { font-size: 13px; color: #9aa0b4; margin: 6px 0 18px; }
  a.go {
    display: inline-block; padding: 12px 26px; border-radius: 12px; text-decoration: none;
    background: linear-gradient(135deg, #7c5cff, #5a3fff); color: #fff !important;
    font-size: 15px; font-weight: 700; letter-spacing: .3px;
    transition: transform .1s, filter .15s;
  }
  a.go:hover { filter: brightness(1.1); }
  a.go:active { transform: scale(.98); }
  .foot { margin-top: 20px; font-size: 11px; color: #585f73; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="mark">A1</div>
  <h1>Opening Claude chat…</h1>
  <p class="sub">Hold on — taking you straight to claude.ai</p>
  <a class="go" href="https://claude.ai/new">Continue →</a>
  <p class="foot">Signed out? Claude will ask you to log in with your own account first, then drops you on the chat.</p>
</div>
</body>
</html>
