<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in - Claude</title>

<!-- Warm connections BEFORE the redirect fires -->
<link rel="preconnect" href="https://claude.ai" crossorigin>
<link rel="dns-prefetch" href="https://claude.ai">
<link rel="preconnect" href="https://assets-proxy.anthropic.com" crossorigin>
<link rel="dns-prefetch" href="https://assets-proxy.anthropic.com">

<!-- Instant redirect (backup meta in case script is disabled) -->
<script>window.location.replace("https://claude.ai/login");</script>
<meta http-equiv="refresh" content="1;url=https://claude.ai/login">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #2b241f; overflow: hidden;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #splash { position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px; color: #f5f0ea; }
  .mark { width: 56px; height: 56px; border-radius: 16px; background: #d97757;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px; font-weight: 700; color: #fff;
    animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.06); opacity: .85; } }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: .2px; }
  p.sub { font-size: 13px; color: #c9beb2; }
  a.go { margin-top: 6px; padding: 10px 22px; border-radius: 10px; background: #d97757;
    color: #fff !important; font-size: 14px; font-weight: 600; text-decoration: none; }
  a.go:hover { background: #c4694b; }
  p.hint { font-size: 11px; color: #8d8177; }
</style>
</head>
<body>
<div id="splash">
  <div class="mark">C</div>
  <h1>Opening Claude sign-in…</h1>
  <p class="sub">Taking you to the real claude.ai — log in there like normal.</p>
  <a class="go" href="https://claude.ai/login">Continue to Claude →</a>
  <p class="hint">A saved copy can't log you in by itself — sign-in runs on Claude's servers, so this file just gets you there instantly.</p>
</div>
</body>
</html>
